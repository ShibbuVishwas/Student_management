<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Students | Student Management</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header class="topbar">
    <div>
        <h1>Student Management System</h1>
        <p id="professorInfo" class="professor-info"></p>
    </div>
    <button type="button" id="logoutBtn" class="btn btn-outline">Logout</button>
</header>

<main class="container">
    <section class="panel">
        <h2 id="formTitle">Add Student</h2>
        <form id="studentForm">
            <input type="hidden" id="studentId" />

            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" required />
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" required />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required />
                </div>
                <div class="form-group">
                    <label for="branch">Branch</label>
                    <input type="text" id="branch" readonly />
                </div>
            </div>

            <div class="form-group">
                <label for="year">Year</label>
                <input type="number" id="year" min="1" max="4" required />
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
                <button type="button" class="btn btn-outline" id="cancelBtn" hidden>Cancel</button>
            </div>
        </form>
    </section>

    <section class="panel">
        <div class="panel-header">
            <h2 id="tableTitle">Branch Students</h2>
            <button type="button" id="refreshBtn" class="btn btn-outline">Refresh</button>
        </div>

        <p id="tableMessage" class="message"></p>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Branch</th>
                    <th>Year</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="studentTableBody">
                <tr>
                    <td colspan="7" class="empty-row">Loading students...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="/js/student.js"></script>
</body>
</html>
