spring.application.name=Student-management

# MySQL - use your existing database
spring.datasource.url=jdbc:mysql://localhost:3306/student_management?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=Shebu@7440
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Run data.sql after JPA creates tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Serve HTML from templates/ and static/ (no Thymeleaf)
spring.web.resources.static-locations=classpath:/static/,classpath:/templates/
